<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEOMAX — Agent SEO</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f7f8fc; height: 100vh; display: flex; flex-direction: column; }
.top { background: #fff; border-bottom: 1.5px solid #e8eaf6; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-av { width: 38px; height: 38px; background: #5c6bc0; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.logo-name { font-size: 15px; font-weight: 700; color: #1a1a2e; }
.logo-sub { font-size: 11px; color: #7986cb; margin-top: 1px; }
.online { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #43a047; font-weight: 500; background: #f1f8e9; border: 1.5px solid #c5e1a5; padding: 4px 12px; border-radius: 20px; }
.online-dot { width: 7px; height: 7px; background: #66bb6a; border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.msgs { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 18px; }
.msg { display: flex; gap: 10px; animation: fadein 0.3s ease; }
.msg.user { flex-direction: row-reverse; }
@keyframes fadein { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.av { width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; margin-top: 2px; }
.av-s { background: #e8eaf6; }
.av-u { background: #e3f2fd; }
.msg-col { display: flex; flex-direction: column; gap: 4px; max-width: 76%; }
.msg-name { font-size: 11px; font-weight: 500; color: #aab0c4; padding: 0 4px; }
.msg.user .msg-name { text-align: right; }
.bubble { padding: 12px 16px; font-size: 13.5px; line-height: 1.7; color: #2d3047; }
.bubble-s { background: #fff; border: 1.5px solid #e8eaf6; border-radius: 4px 18px 18px 18px; }
.bubble-u { background: #5c6bc0; color: #fff; border-radius: 18px 4px 18px 18px; }
.tools-row { display: flex; flex-wrap: wrap; gap: 5px; margin: 8px 0 4px; }
.tool-tag { background: #fff8e1; border: 1.5px solid #ffe082; color: #f57f17; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
.score-card { background: #f7f8fc; border: 1.5px solid #e8eaf6; border-radius: 14px; padding: 12px 14px; margin: 10px 0; }
.score-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.score-circle { width: 52px; height: 52px; border-radius: 50%; background: #fff; border: 3px solid #ef9a9a; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
.score-num { font-size: 18px; font-weight: 700; color: #e53935; line-height: 1; }
.score-den { font-size: 9px; color: #aab0c4; }
.score-title { font-size: 13px; font-weight: 600; color: #2d3047; }
.score-desc { font-size: 11px; color: #7986cb; margin-top: 2px; }
.checks { display: flex; flex-direction: column; gap: 5px; }
.check-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #455a64; background: #fff; border-radius: 10px; padding: 7px 10px; border: 1px solid #f0f0f5; }
.check-label { flex: 1; }
.check-badge { font-size: 10px; font-weight: 600; padding: 2px 9px; border-radius: 20px; }
.bad { background: #ffebee; color: #e53935; }
.ok { background: #e8f5e9; color: #43a047; }
.qa-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.qa { background: #f0f2ff; border: 1.5px solid #c5cae9; border-radius: 20px; font-size: 12px; font-weight: 500; color: #5c6bc0; padding: 6px 14px; cursor: pointer; transition: all 0.15s; }
.qa:hover { background: #e8eaf6; }
.typing { display: flex; gap: 5px; align-items: center; padding: 8px 4px; }
.t-dot { width: 7px; height: 7px; border-radius: 50%; animation: bounce 1.2s ease-in-out infinite; }
.t-dot:nth-child(1) { background: #c5cae9; }
.t-dot:nth-child(2) { background: #9fa8da; animation-delay: 0.2s; }
.t-dot:nth-child(3) { background: #7986cb; animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
.inp-area { background: #fff; border-top: 1.5px solid #e8eaf6; padding: 14px 24px; display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
.inp-box { flex: 1; background: #f7f8fc; border: 1.5px solid #e8eaf6; border-radius: 24px; padding: 11px 18px; font-size: 13.5px; color: #2d3047; outline: none; font-family: inherit; transition: border-color 0.15s; }
.inp-box:focus { border-color: #9fa8da; background: #fff; }
.inp-box::placeholder { color: #c5cae9; }
.send { width: 40px; height: 40px; background: #5c6bc0; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; flex-shrink: 0; transition: all 0.15s; }
.send:hover { background: #3949ab; transform: translateY(-1px); }
.send:disabled { background: #c5cae9; cursor: not-allowed; transform: none; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: #e8eaf6; border-radius: 2px; }
</style>
</head>
<body>

<div class="top">
  <div class="logo">
    <div class="logo-av">🚀</div>
    <div>
      <div class="logo-name">SEOMAX</div>
      <div class="logo-sub">Votre agent SEO personnel</div>
    </div>
  </div>
  <div class="online"><div class="online-dot"></div>En ligne</div>
</div>

<div class="msgs" id="msgs"></div>

<div class="inp-area">
  <input class="inp-box" id="inp" type="text" placeholder="Posez votre question à SEOMAX..." />
  <button class="send" id="send-btn" onclick="sendMessage()">↑</button>
</div>

<script>
const AGENT_ID = 'agent_011CaY1QbMWkL8UepiQgHedg';
const ENV_ID = 'env_01CSojXza8dTzSDqdtaUUfhH';
let isLoading = false;

function getTime() {
  return new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
}

function addMessage(role, content, isHtml) {
  const msgs = document.getElementById('msgs');
  const div = document.createElement('div');
  div.className = 'msg' + (role === 'user' ? ' user' : '');

  const av = document.createElement('div');
  av.className = 'av ' + (role === 'user' ? 'av-u' : 'av-s');
  av.textContent = role === 'user' ? '👤' : '🚀';

  const col = document.createElement('div');
  col.className = 'msg-col';

  const name = document.createElement('div');
  name.className = 'msg-name';
  name.textContent = role === 'user' ? 'Vous' : 'SEOMAX';

  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + (role === 'user' ? 'bubble-u' : 'bubble-s');

  if (isHtml) {
    bubble.innerHTML = content;
  } else {
    bubble.innerHTML = formatText(content);
  }

  col.appendChild(name);
  col.appendChild(bubble);
  div.appendChild(av);
  div.appendChild(col);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return bubble;
}

function addTyping() {
  const msgs = document.getElementById('msgs');
  const div = document.createElement('div');
  div.className = 'msg';
  div.id = 'typing-indicator';

  const av = document.createElement('div');
  av.className = 'av av-s';
  av.textContent = '🚀';

  const col = document.createElement('div');
  col.className = 'msg-col';

  const bubble = document.createElement('div');
  bubble.className = 'bubble bubble-s';
  bubble.innerHTML = '<div class="typing"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div>';

  col.appendChild(bubble);
  div.appendChild(av);
  div.appendChild(col);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function formatText(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^### (.+)$/gm, '<div style="font-weight:600;color:#5c6bc0;margin:8px 0 4px">$1</div>')
    .replace(/^## (.+)$/gm, '<div style="font-weight:700;color:#3949ab;margin:10px 0 6px;font-size:14px">$1</div>')
    .replace(/^[-•] (.+)$/gm, '<div style="padding:2px 0 2px 12px">› $1</div>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

function addQuickActions(bubble, actions) {
  const row = document.createElement('div');
  row.className = 'qa-row';
  actions.forEach(a => {
    const btn = document.createElement('div');
    btn.className = 'qa';
    btn.textContent = a;
    btn.onclick = () => {
      document.getElementById('inp').value = a;
      sendMessage();
    };
    row.appendChild(btn);
  });
  bubble.appendChild(row);
}

async function sendMessage() {
  if (isLoading) return;
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;

  inp.value = '';
  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  addMessage('user', text);
  addTyping();

  try {
    const resp = await fetch('/audit', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url: text, email: '', keyword: ''})
    });

    removeTyping();
    const bubble = addMessage('agent', '').parentElement.querySelector('.bubble');
    let fullText = '';

    const reader = resp.body.getReader();
    const dec = new TextDecoder();

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      const chunk = dec.decode(value);
      for (const line of chunk.split('\n')) {
        if (!line.startsWith('data:')) continue;
        try {
          const d = JSON.parse(line.slice(5).trim());
          if (d.type === 'message') {
            fullText += d.content + '\n';
            bubble.innerHTML = formatText(fullText);
            document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
          } else if (d.type === 'tool') {
            const tag = document.createElement('span');
            tag.className = 'tool-tag';
            tag.textContent = '⚡ ' + d.content.replace('🛠️ Utilisation de : ', '');
            let row = bubble.querySelector('.tools-row');
            if (!row) { row = document.createElement('div'); row.className = 'tools-row'; bubble.prepend(row); }
            row.appendChild(tag);
          } else if (d.type === 'done') {
            addQuickActions(bubble, ['📋 Voir le plan d\'action', '📧 Recevoir par email', '🏆 Analyser les concurrents']);
          }
        } catch(e) {}
      }
    }
  } catch(e) {
    removeTyping();
    addMessage('agent', 'Oups, une erreur est survenue 😕 Réessayez dans un instant !');
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  inp.focus();
}

document.getElementById('inp').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMessage();
});

window.onload = () => {
  const bubble = addMessage('agent', '').parentElement.querySelector('.bubble');
  bubble.innerHTML = '👋 Salut ! Je suis <strong>SEOMAX</strong>, votre agent SEO personnel.<br><br>Donnez-moi une URL à analyser, posez-moi une question SEO, ou dites-moi quel mot-clé vous souhaitez cibler — je m\'occupe du reste !';
  addQuickActions(bubble, ['🔍 Auditer mon site', '🎯 Analyser un mot-clé', '🏆 Voir mes concurrents']);
};
</script>
</body>
</html>
